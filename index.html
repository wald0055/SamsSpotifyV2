<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sam 🎧</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1db954;
    --green-dim: rgba(29,185,84,0.15);
    --bg-deep: #0a0f0c;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text-muted: rgba(240,237,232,0.5);
    --player-bg: rgba(10,15,12,0.95);
    --sidebar-bg: rgba(0,0,0,0.6);
    --accent: #e8d5b0;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Ambient background glow */
  #ambientBg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(20px) brightness(0.25) saturate(1.8);
    transform: scale(1.3);
    transition: background-image 1.2s ease;
    pointer-events: none;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 28px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .sidebar-title span {
    display: block;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-muted);
    transition: all 0.2s;
    font-weight: 400;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-btn:hover { background: var(--bg-card-hover); color: var(--text); }
  .nav-btn.active { background: var(--green-dim); color: var(--green); }

  .nav-btn svg { flex-shrink: 0; }

  .sidebar-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 10px 0;
  }

  /* ─── MAIN ─── */
  .main {
    flex: 1;
    overflow-y: auto;
    z-index: 5;
    padding: 32px 28px;
    padding-bottom: 160px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

  .section-header {
    margin-bottom: 24px;
  }

  .section-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .section-header p {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ─── SONG LIST ─── */
  #songList { display: flex; flex-direction: column; gap: 2px; }

  .song {
    display: grid;
    grid-template-columns: 24px 46px 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.18s;
  }

  .song:hover { background: var(--bg-card-hover); }
  .song.active { background: var(--green-dim); }
  .song.active .song-title { color: var(--green); }

  .song-num {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .song.active .song-num { color: var(--green); }

  .song-cover {
    width: 46px;
    height: 46px;
    border-radius: 6px;
    object-fit: cover;
    background: #1a2420;
  }

  .song-info { min-width: 0; }

  .song-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .song-artist {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .like-btn {
    background: none;
    border: none;
    font-size: 15px;
    cursor: pointer;
    padding: 4px;
    opacity: 0.5;
    transition: all 0.2s;
    line-height: 1;
  }

  .like-btn:hover { opacity: 1; transform: scale(1.2); }
  .like-btn.liked { opacity: 1; }

  /* ─── PLAYER ─── */
  .player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 90px;
    background: var(--player-bg);
    backdrop-filter: blur(40px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    z-index: 100;
  }

  /* Now playing */
  .now-playing {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .now-cover {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    background: #1a2420;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }

  .now-cover.spinning {
    animation: coverSpin 20s linear infinite;
    border-radius: 50%;
  }

  @keyframes coverSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .now-text { min-width: 0; }

  .now-title {
    font-size: 13.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-artist {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Center controls */
  .center-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .ctrl-buttons {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { color: var(--text); }

  .ctrl-btn.play-pause {
    background: var(--text);
    color: var(--bg-deep);
    width: 36px;
    height: 36px;
    border-radius: 50%;
  }

  .ctrl-btn.play-pause:hover { transform: scale(1.06); background: white; }

  /* Seek bar */
  .seek-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .time-label {
    font-size: 10.5px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    text-align: center;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  #seekBar {
    flex: 1;
    height: 4px;
  }

  #seekBar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    transition: transform 0.15s;
    margin-top: -4px;
  }

  #seekBar:hover::-webkit-slider-thumb { transform: scale(1.3); background: white; }
  #seekBar::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

  #volumeSlider {
    width: 80px;
    height: 4px;
  }

  #volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    margin-top: -4px;
  }

  #volumeSlider::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); }

  /* ─── MOBILE ─── */
@media (max-width: 480px) {
  .section-header h1 {
    font-size: 18px;
  }

  .song {
    grid-template-columns: 18px 36px 1fr auto;
    gap: 8px;
  }

  .song-cover {
    width: 36px;
    height: 36px;
  }

  .song-title {
    font-size: 13px;
  }

  .song-artist {
    font-size: 11px;
  }

  .player {
    padding: 10px 12px 20px;
  }

  .now-cover {
    width: 40px;
    height: 40px;
  }

  .ctrl-btn.play-pause {
    width: 32px;
    height: 32px;
  }

  .time-label {
    font-size: 9px;
  }
}

  @media (max-width: 700px) {
    body { flex-direction: column; height: auto; overflow: auto; }

    .sidebar {
    width: 100%;
    min-width: unset;
    flex-direction: column;
    padding: 10px 12px;
    gap: 10px;

    position: sticky;
    top: 0;
    z-index: 50;
  }

  .sidebar-title {
    font-size: 14px;
    margin: 0;
  }

  .sidebar-title span {
    display: none;
  }

  /* 🔥 toggle bar ONLY on mobile */
  .nav-group {
    flex-direction: row;
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }

  .nav-btn {
    flex: 1;
    justify-content: center;
    padding: 8px 10px;
    font-size: 12px;
    border-radius: 999px;
  }

  .nav-btn svg {
    display: none;
  }

  .nav-btn.active {
    background: linear-gradient(90deg, #1db954, #1ed760);
    color: #000;
  }

  .sidebar-divider {
    display: none;
  }
}

  /* 🔥 CLEAN TOGGLE BAR */
  .nav-group {
    display: flex;
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }

  .nav-btn {
    flex: 1;
    justify-content: center;
    padding: 8px 10px;
    font-size: 12px;
    border-radius: 999px;
    background: transparent;
  }

  .nav-btn svg {
    display: none; /* cleaner on mobile */
  }

  .nav-btn.active {
    background: linear-gradient(90deg, #1db954, #1ed760);
    color: #000;
  }

  .sidebar-divider {
    display: none;
  }
}
  /* wrap buttons in a flex group */
  .nav-btn {
    padding: 6px 8px;
    font-size: 11.5px;
    white-space: nowrap;
  }

  .sidebar-divider {
    display: none;
  }

/* buttons */
.nav-btn {
  padding: 6px 10px;
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* remove divider */
.sidebar-divider {
  display: none;
}

    .sidebar-title { margin-bottom: 0; font-size: 15px; flex: 1; }
    .sidebar-title span { display: none; }
    .sidebar-divider { display: none; }

    .nav-btn { padding: 8px 10px; font-size: 12px; }

    .main { padding: 20px 16px; padding-bottom: 180px; }

    .section-header h1 { font-size: 22px; }

    .song { grid-template-columns: 20px 40px 1fr auto; gap: 10px; }

    .player {
      grid-template-columns: 1fr;
      height: auto;
      padding: 12px 16px 20px;
      gap: 10px;
    }

    .volume-row { display: none; }

    .now-playing { justify-content: center; }
    .now-cover { width: 44px; height: 44px; }

    #seekBar { width: 100%; }
  }

  /* Fade-in for songs */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .song {
    animation: fadeUp 0.3s ease both;
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
  }
</style>
</head>
<body>

<div id="ambientBg"></div>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-title">
    <span>For Sam</span>
    For Sam♥
  </div>
  <div class="nav-group">
  <button class="nav-btn active" id="btnAll" onclick="showAllSongs()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
    All Songs
  </button>

  <button class="nav-btn" id="btnLiked" onclick="showLikedSongs()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    Liked❤️
  </button>
</div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="section-header">
    <h1 id="sectionTitle">Noah Kahan</h1>
    <p id="sectionSubtitle">19 songs · just for you ♥</p>
  </div>
  <div id="songList"></div>
</main>

<!-- PLAYER -->
<footer class="player">
  <!-- Now Playing -->
  <div class="now-playing">
    <img class="now-cover" id="nowCover" src="" alt="">
    <div class="now-text">
      <div class="now-title" id="nowTitle">Nothing playing</div>
      <div class="now-artist" id="nowArtist">—</div>
    </div>
  </div>

  <!-- Controls + Seek -->
  <div class="center-controls">
    <div class="ctrl-buttons">
      <button class="ctrl-btn" onclick="prevSong()" title="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextSong()" title="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="seek-row">
      <span class="time-label" id="currentTime">0:00</span>
      <input type="range" id="seekBar" value="0" min="0" max="100">
      <span class="time-label" id="totalTime">0:00</span>
    </div>
  </div>

  <!-- Volume -->
  <div class="volume-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
  </div>
</footer>

<audio id="audio"></audio>

<script>
const songs = [
  { title: "Stick Season",           artist: "Noah Kahan", src: "songs/stickseason.mp3",  cover: "covers/cover1.png" },
  { title: "Northern Attitude",      artist: "Noah Kahan", src: "songs/northern.mp3",      cover: "covers/cover1.png" },
  { title: "Dial Drunk",             artist: "Noah Kahan", src: "songs/dialdrunk.mp3",     cover: "covers/cover3.jpg" },
  { title: "All my love",            artist: "Noah Kahan", src: "songs/allmylove.mp3",     cover: "covers/cover1.png" },
  { title: "Passenger",              artist: "Noah Kahan", src: "songs/passenger.mp3",     cover: "covers/cover5.jpg" },
  { title: "Orange Juice",           artist: "Noah Kahan", src: "songs/orangejuice.mp3",   cover: "covers/cover1.png" },
  { title: "Carlo's Song",           artist: "Noah Kahan", src: "songs/carlos.mp3",        cover: "covers/cover6.jpg" },
  { title: "Deny Deny Deny",         artist: "Noah Kahan", src: "songs/denydeny.mp3",      cover: "covers/cover7.jpg" },
  { title: "All Them Horses",        artist: "Noah Kahan", src: "songs/allthemhorses.mp3", cover: "covers/cover7.jpg" },
  { title: "You're Gonna Go Far",    artist: "Noah Kahan", src: "songs/gonnagofar.mp3",    cover: "covers/cover3.jpg" },
  { title: "Everywhere, Everything", artist: "Noah Kahan", src: "songs/everywhere.mp3",    cover: "covers/cover3.jpg" },
  { title: "Maine",                  artist: "Noah Kahan", src: "songs/maine.mp3",         cover: "covers/cover9.jpg" },
  { title: "Animal",                 artist: "Noah Kahan", src: "songs/animal.mp3",        cover: "covers/cover10.jpg" },
  { title: "Dan",                    artist: "Noah Kahan", src: "songs/dan.mp3",           cover: "covers/cover7.jpg" },
  { title: "Staying Still",          artist: "Noah Kahan", src: "songs/stayingstill.mp3",  cover: "covers/cover7.jpg" },
  { title: "The Great Divide",       artist: "Noah Kahan", src: "songs/greatdivide.mp3",   cover: "covers/cover7.jpg" },
  { title: "Dashboard",              artist: "Noah Kahan", src: "songs/dashboard.mp3",     cover: "covers/cover7.jpg" },
  { title: "End of August",          artist: "Noah Kahan", src: "songs/endofaugust.mp3",   cover: "covers/cover7.jpg" },
  { title: "Orbiter",                artist: "Noah Kahan", src: "songs/orbiter.mp3",       cover: "covers/cover7.jpg" },
];

let current = -1;
let playing = false;
let showingLiked = false;
let likedSongs = JSON.parse(localStorage.getItem("likedSongs_sam") || "[]");

const audio     = document.getElementById("audio");
const playBtn   = document.getElementById("playBtn");
const playIcon  = document.getElementById("playIcon");
const seekBar   = document.getElementById("seekBar");
const volSlider = document.getElementById("volumeSlider");
const nowTitle  = document.getElementById("nowTitle");
const nowArtist = document.getElementById("nowArtist");
const nowCover  = document.getElementById("nowCover");
const ambientBg = document.getElementById("ambientBg");
const currentTimeEl = document.getElementById("currentTime");
const totalTimeEl   = document.getElementById("totalTime");
const songList  = document.getElementById("songList");

// SVGs
const PLAY_SVG  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const PAUSE_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, "0");
  return `${m}:${sec}`;
}

function renderSongs() {
  songList.innerHTML = "";
  const list = showingLiked
    ? songs.map((s, i) => ({ s, i })).filter(({ i }) => likedSongs.includes(i))
    : songs.map((s, i) => ({ s, i }));

  if (list.length === 0) {
    songList.innerHTML = `<div class="empty-state">No liked songs yet — tap 🤍 to save your favourites</div>`;
    return;
  }

  list.forEach(({ s, i }, rowNum) => {
    const div = document.createElement("div");
    div.className = "song" + (i === current ? " active" : "");
    div.style.animationDelay = `${rowNum * 0.03}s`;
    div.innerHTML = `
      <div class="song-num">${rowNum + 1}</div>
      <img class="song-cover" src="${s.cover}" alt="${s.title}" onerror="this.style.background='#1a2420'">
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
      </div>
      <button class="like-btn ${likedSongs.includes(i) ? 'liked' : ''}" title="Like">${likedSongs.includes(i) ? '❤️' : '🤍'}</button>
    `;

    div.addEventListener("click", () => playSong(i));
    div.querySelector(".like-btn").addEventListener("click", e => {
      e.stopPropagation();
      toggleLike(i);
    });

    songList.appendChild(div);
  });
}

function toggleLike(i) {
  if (likedSongs.includes(i)) {
    likedSongs = likedSongs.filter(x => x !== i);
  } else {
    likedSongs.push(i);
  }
  localStorage.setItem("likedSongs_sam", JSON.stringify(likedSongs));
  renderSongs();
}

function playSong(i) {
  current = i;
  const song = songs[i];
  audio.src = song.src;
  audio.volume = parseFloat(volSlider.value);
  audio.play().catch(() => {});
  playing = true;

  playBtn.innerHTML = PAUSE_SVG;
  nowTitle.textContent = song.title;
  nowArtist.textContent = song.artist;
  nowCover.src = song.cover;
  nowCover.classList.add("spinning");
  ambientBg.style.backgroundImage = `url(${song.cover})`;

  renderSongs();
}

function togglePlay() {
  if (current < 0) { playSong(0); return; }
  if (playing) {
    audio.pause();
    playBtn.innerHTML = PLAY_SVG;
    nowCover.classList.remove("spinning");
  } else {
    audio.play();
    playBtn.innerHTML = PAUSE_SVG;
    nowCover.classList.add("spinning");
  }
  playing = !playing;
}

function nextSong() {
  playSong((current + 1) % songs.length);
}

function prevSong() {
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  playSong((current - 1 + songs.length) % songs.length);
}

function showAllSongs() {
  showingLiked = false;
  document.getElementById("btnAll").classList.add("active");
  document.getElementById("btnLiked").classList.remove("active");
  document.getElementById("sectionTitle").textContent = "Noah Kahan";
  document.getElementById("sectionSubtitle").textContent = `${songs.length} songs · just for you ♥`;
  renderSongs();
}

function showLikedSongs() {
  showingLiked = true;
  document.getElementById("btnLiked").classList.add("active");
  document.getElementById("btnAll").classList.remove("active");
  const count = likedSongs.length;
  document.getElementById("sectionTitle").textContent = "Liked Songs";
  document.getElementById("sectionSubtitle").textContent = `${count} song${count !== 1 ? 's' : ''} · your favourites`;
  renderSongs();
}

// Seek
audio.addEventListener("timeupdate", () => {
  if (!audio.duration) return;
  seekBar.value = (audio.currentTime / audio.duration) * 100;
  currentTimeEl.textContent = fmt(audio.currentTime);
  totalTimeEl.textContent = fmt(audio.duration);
});

seekBar.addEventListener("input", () => {
  if (!audio.duration) return;
  audio.currentTime = (seekBar.value / 100) * audio.duration;
});

volSlider.addEventListener("input", () => {
  audio.volume = volSlider.value;
});

audio.addEventListener("ended", nextSong);

// Init
audio.volume = parseFloat(volSlider.value);
renderSongs();
</script>
</body>
</html>
