<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sam 🎧</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1db954;
    --green-dim: rgba(29,185,84,0.15);
    --bg-deep: #0a0f0c;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text-muted: rgba(240,237,232,0.5);
    --player-bg: rgba(10,15,12,0.95);
    --sidebar-bg: rgba(0,0,0,0.6);
    --accent: #e8d5b0;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #ambientBg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(15px) brightness(0.25) saturate(1.8);
    transform: scale(1.3);
    transition: background-image 1.2s ease;
    pointer-events: none;
  }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 28px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .sidebar-title span {
    display: block;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .nav-group { display: flex; flex-direction: column; gap: 4px; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-muted);
    transition: all 0.2s;
    font-weight: 400;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-btn:hover { background: var(--bg-card-hover); color: var(--text); }
  .nav-btn.active { background: var(--green-dim); color: var(--green); }
  .nav-btn svg { flex-shrink: 0; }

  .sidebar-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 10px 0; }

  .main {
    flex: 1;
    overflow-y: auto;
    z-index: 5;
    padding: 32px 28px;
    padding-bottom: 160px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

  .section-header { margin-bottom: 24px; }

  .section-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .section-header p { font-size: 13px; color: var(--text-muted); }

  #songList { display: flex; flex-direction: column; gap: 2px; }

  .song {
    display: grid;
    grid-template-columns: 18px 24px 46px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.18s;
    animation: fadeUp 0.3s ease both;
    user-select: none;
  }

  .song:hover { background: var(--bg-card-hover); }
  .song.active { background: var(--green-dim); }
  .song.active .song-title { color: var(--green); }
  .song.active .song-num { color: var(--green); }

  .song.dragging {
    opacity: 0.4;
    background: var(--bg-card);
  }

  .song.drag-over {
    background: rgba(29,185,84,0.08);
    border: 1px solid rgba(29,185,84,0.25);
  }

  .drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    touch-action: none;
  }

  .song:hover .drag-handle { opacity: 0.6; }
  .drag-handle:active { cursor: grabbing; }

  .song-num {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .song-cover {
    width: 46px;
    height: 46px;
    border-radius: 6px;
    object-fit: cover;
    background: #1a2420;
  }

  .song-info { min-width: 0; }

  .song-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .song-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .like-btn {
    background: none;
    border: none;
    font-size: 15px;
    cursor: pointer;
    padding: 4px;
    opacity: 0.5;
    transition: all 0.2s;
    line-height: 1;
  }

  .like-btn:hover { opacity: 1; transform: scale(1.2); }
  .like-btn.liked { opacity: 1; }

  .player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 90px;
    background: var(--player-bg);
    backdrop-filter: blur(40px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    z-index: 100;
  }

  .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }

  .now-cover {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    background: #1a2420;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }

  .now-cover.spinning {
    animation: coverSpin 20s linear infinite;
    border-radius: 50%;
  }

  @keyframes coverSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .now-text { min-width: 0; }

  .now-title {
    font-size: 13.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-artist { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

  .center-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  .ctrl-buttons { display: flex; align-items: center; gap: 8px; }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { color: var(--text); }

  .ctrl-btn.play-pause {
    background: var(--text);
    color: var(--bg-deep);
    width: 36px;
    height: 36px;
    border-radius: 50%;
  }

  .ctrl-btn.play-pause:hover { transform: scale(1.06); background: white; }

  .seek-row { display: flex; align-items: center; gap: 8px; width: 100%; }

  .time-label {
    font-size: 10.5px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    text-align: center;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  #seekBar { flex: 1; height: 4px; }

  #seekBar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    transition: transform 0.15s;
    margin-top: -4px;
  }

  #seekBar:hover::-webkit-slider-thumb { transform: scale(1.3); background: white; }
  #seekBar::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); }

  .volume-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }

  #volumeSlider { width: 80px; height: 4px; }

  #volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    margin-top: -4px;
  }

  #volumeSlider::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
  }

  @media (max-width: 700px) {
    body { flex-direction: column; height: auto; overflow: auto; }

    .sidebar {
      width: 100%;
      min-width: unset;
      flex-direction: row;
      align-items: center;
      padding: 10px 12px;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .sidebar-title { font-size: 15px; margin-bottom: 0; flex: 1; }
    .sidebar-title span { display: none; }
    .sidebar-divider { display: none; }

    .nav-group {
      flex-direction: row;
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .nav-btn {
      flex: 1;
      justify-content: center;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .nav-btn svg { display: none; }
    .nav-btn.active { background: linear-gradient(90deg, #1db954, #1ed760); color: #000; }

    .main { padding: 20px 16px; padding-bottom: 180px; }
    .section-header h1 { font-size: 22px; }

    .song { grid-template-columns: 18px 18px 40px 1fr auto; gap: 8px; }

    .player {
      grid-template-columns: 1fr;
      height: auto;
      padding: 12px 16px 20px;
      gap: 10px;
    }

    .volume-row { display: none; }
    .now-playing { justify-content: center; }
    .now-cover { width: 44px; height: 44px; }
  }

  @media (max-width: 480px) {
    .section-header h1 { font-size: 18px; }
    .song { grid-template-columns: 16px 16px 36px 1fr auto; gap: 7px; }
    .song-cover { width: 36px; height: 36px; }
    .song-title { font-size: 13px; }
    .song-artist { font-size: 11px; }
    .player { padding: 10px 12px 20px; }
    .now-cover { width: 40px; height: 40px; }
    .ctrl-btn.play-pause { width: 32px; height: 32px; }
    .time-label { font-size: 9px; }
  }
</style>
</head>
<body>

<div id="ambientBg"></div>

<nav class="sidebar">
  <div class="sidebar-title">
    <span></span>
    For Sam♥
  </div>
  <div class="nav-group">
    <button class="nav-btn active" id="btnAll" onclick="showAllSongs()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
      All Songs
    </button>
    <button class="nav-btn" id="btnLiked" onclick="showLikedSongs()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      Liked❤️
    </button>
  </div>
</nav>

<main class="main">
  <div class="section-header">
    <h1 id="sectionTitle">Sam's </h1>
    <p id="sectionSubtitle">19 songs · just for you ♥</p>
  </div>
  <div id="songList"></div>
</main>

<footer class="player">
  <div class="now-playing">
    <img class="now-cover" id="nowCover" src="" alt="">
    <div class="now-text">
      <div class="now-title" id="nowTitle">Nothing playing</div>
      <div class="now-artist" id="nowArtist">—</div>
    </div>
  </div>

  <div class="center-controls">
    <div class="ctrl-buttons">
      <button class="ctrl-btn" onclick="prevSong()" title="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextSong()" title="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="seek-row">
      <span class="time-label" id="currentTime">0:00</span>
      <input type="range" id="seekBar" value="0" min="0" max="100">
      <span class="time-label" id="totalTime">0:00</span>
    </div>
  </div>

  <div class="volume-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
  </div>
</footer>

<audio id="audio"></audio>

<script>

  const defaultSongs = [
  { title: "Maine",                  artist: "Noah Kahan", src: "songs/maine.mp3",         cover: "covers/cover9.jpg" },
  { title: "Blue Star",              artist: "Treaty Oak Revival", src: "songs/bluestar.mp3",     cover: "covers/cover16.jpg" },
  { title: "Everywhere, Everything", artist: "Noah Kahan", src: "songs/everywhere.mp3",    cover: "covers/cover3.jpg" },
  { title: "Fool's Gold",            artist: "Buffalo Traffic Jam", src: "songs/foolsgold.mp3",  cover: "covers/cover15.jpg" },
  { title: "Dial Drunk",             artist: "Noah Kahan", src: "songs/dialdrunk.mp3",     cover: "covers/cover3.jpg" },
  { title: "Orbiter",                artist: "Noah Kahan", src: "songs/orbiter.mp3",       cover: "covers/cover7.jpg" },
  { title: "Dan",                    artist: "Noah Kahan", src: "songs/dan.mp3",           cover: "covers/cover7.jpg" },
  { title: "Sun to Me",              artist: "Zach Bryan", src: "songs/suntome.mp3",       cover: "covers/cover11.png" },
  { title: "All Them Horses",        artist: "Noah Kahan", src: "songs/allthemhorses.mp3", cover: "covers/cover7.jpg" },
  { title: "Stick Season",           artist: "Noah Kahan", src: "songs/stickseason.mp3",  cover: "covers/cover1.png" },
  { title: "Staying Still",          artist: "Noah Kahan", src: "songs/stayingstill.mp3",  cover: "covers/cover7.jpg" },
  { title: "Blue",                   artist: "Zach Bryan", src: "songs/blue.mp3",          cover: "covers/cover11.png" },
  { title: "American Cars",          artist: "Noah Kahan", src: "songs/americancars.mp3",  cover: "covers/cover7.jpg" },
  { title: "Orange Juice",           artist: "Noah Kahan", src: "songs/orangejuice.mp3",   cover: "covers/cover1.png" },
  { title: "Passenger",              artist: "Noah Kahan", src: "songs/passenger.mp3",     cover: "covers/cover5.jpg" },
  { title: "Sarah's Place",          artist: "Zach Bryan (feat. Noah Kahan)", src: "songs/sarahsplace.mp3", cover: "covers/cover14.jpg" },
  { title: "Northern Attitude",      artist: "Noah Kahan", src: "songs/northern.mp3",      cover: "covers/cover1.png" },
  { title: "Deny Deny Deny",         artist: "Noah Kahan", src: "songs/denydeny.mp3",      cover: "covers/cover7.jpg" },
  { title: "End of August",          artist: "Noah Kahan", src: "songs/endofaugust.mp3",   cover: "covers/cover7.jpg" },
  { title: "Carlo's Song",           artist: "Noah Kahan", src: "songs/carlos.mp3",        cover: "covers/cover6.jpg" },
  { title: "Animal",                 artist: "Noah Kahan", src: "songs/animal.mp3",        cover: "covers/cover10.jpg" },
  { title: "You're Gonna Go Far",    artist: "Noah Kahan", src: "songs/gonnagofar.mp3",    cover: "covers/cover3.jpg" },
  { title: "Talkin' Tennessee",      artist: "Morgan Wallen", src: "songs/talkintennessee.mp3", cover: "covers/cover12.jpg" },
  { title: "Dashboard",              artist: "Noah Kahan", src: "songs/dashboard.mp3",     cover: "covers/cover7.jpg" },
  { title: "All my love",            artist: "Noah Kahan", src: "songs/allmylove.mp3",     cover: "covers/cover1.png" },
  { title: "The Great Divide",       artist: "Noah Kahan", src: "songs/greatdivide.mp3",   cover: "covers/cover7.jpg" },
  { title: "Doors",                  artist: "Noah Kahan", src: "songs/doors.mp3",         cover: "covers/cover7.jpg" },
];

let songs = JSON.parse(localStorage.getItem("songs_order_sam") || "null") || defaultSongs;

let currentSrc = null;
let playing = false;
let showingLiked = false;
let likedSongs = JSON.parse(localStorage.getItem("likedSongs_sam") || "[]");

const audio     = document.getElementById("audio");
const playBtn   = document.getElementById("playBtn");
const seekBar   = document.getElementById("seekBar");
const volSlider = document.getElementById("volumeSlider");
const nowTitle  = document.getElementById("nowTitle");
const nowArtist = document.getElementById("nowArtist");
const nowCover  = document.getElementById("nowCover");
const ambientBg = document.getElementById("ambientBg");
const currentTimeEl = document.getElementById("currentTime");
const totalTimeEl   = document.getElementById("totalTime");
const songListEl    = document.getElementById("songList");

const PLAY_SVG  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const PAUSE_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
const HANDLE_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3h2v2H9V3zm4 0h2v2h-2V3zM9 7h2v2H9V7zm4 0h2v2h-2V7zM9 11h2v2H9v-2zm4 0h2v2h-2v-2zM9 15h2v2H9v-2zm4 0h2v2h-2v-2zM9 19h2v2H9v-2zm4 0h2v2h-2v-2z"/></svg>`;

function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, "0");
  return `${m}:${sec}`;
}

function saveOrder() {
  localStorage.setItem("songs_order_sam", JSON.stringify(songs));
}

function currentSong() {
  return songs.find(s => s.src === currentSrc) || null;
}

function currentIndex() {
  return songs.findIndex(s => s.src === currentSrc);
}

function renderSongs() {
  songListEl.innerHTML = "";
  const list = showingLiked
    ? songs.filter(s => likedSongs.includes(s.src))
    : songs;

  if (list.length === 0) {
    songListEl.innerHTML = `<div class="empty-state">No liked songs yet — tap 🤍 to save your favourites</div>`;
    return;
  }

  list.forEach((s, rowNum) => {
    const isActive = s.src === currentSrc;
    const isLiked = likedSongs.includes(s.src);

    const div = document.createElement("div");
    div.className = "song" + (isActive ? " active" : "");
    div.style.animationDelay = `${rowNum * 0.03}s`;
    div.dataset.src = s.src;

    div.innerHTML = `
      <div class="drag-handle" title="Drag to reorder">${HANDLE_SVG}</div>
      <div class="song-num">${rowNum + 1}</div>
      <img class="song-cover" src="${s.cover}" alt="${s.title}" onerror="this.style.background='#1a2420'">
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
      </div>
      <button class="like-btn ${isLiked ? 'liked' : ''}" title="Like">${isLiked ? '❤️' : '🤍'}</button>
    `;

    div.addEventListener("click", e => {
      if (e.target.closest(".drag-handle") || e.target.closest(".like-btn")) return;
      playSong(s.src);
    });

    div.querySelector(".like-btn").addEventListener("click", e => {
      e.stopPropagation();
      toggleLike(s.src);
    });

    setupDrag(div);
    songListEl.appendChild(div);
  });
}

function toggleLike(src) {
  if (likedSongs.includes(src)) {
    likedSongs = likedSongs.filter(x => x !== src);
  } else {
    likedSongs.push(src);
  }
  localStorage.setItem("likedSongs_sam", JSON.stringify(likedSongs));
  renderSongs();
}

function playSong(src) {
  currentSrc = src;
  const song = songs.find(s => s.src === src);
  if (!song) return;
  audio.src = song.src;
  audio.volume = parseFloat(volSlider.value);
  audio.play().catch(() => {});
  playing = true;

  playBtn.innerHTML = PAUSE_SVG;
  nowTitle.textContent = song.title;
  nowArtist.textContent = song.artist;
  nowCover.src = song.cover;
  nowCover.classList.add("spinning");
  ambientBg.style.backgroundImage = `url(${song.cover})`;

  renderSongs();
}

function togglePlay() {
  if (!currentSrc) { if (songs.length) playSong(songs[0].src); return; }
  if (playing) {
    audio.pause();
    playBtn.innerHTML = PLAY_SVG;
    nowCover.classList.remove("spinning");
  } else {
    audio.play();
    playBtn.innerHTML = PAUSE_SVG;
    nowCover.classList.add("spinning");
  }
  playing = !playing;
}

function nextSong() {
  const list = showingLiked ? songs.filter(s => likedSongs.includes(s.src)) : songs;
  const idx = list.findIndex(s => s.src === currentSrc);
  playSong(list[(idx + 1) % list.length].src);
}

function prevSong() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const list = showingLiked ? songs.filter(s => likedSongs.includes(s.src)) : songs;
  const idx = list.findIndex(s => s.src === currentSrc);
  playSong(list[(idx - 1 + list.length) % list.length].src);
}

function showAllSongs() {
  showingLiked = false;
  document.getElementById("btnAll").classList.add("active");
  document.getElementById("btnLiked").classList.remove("active");
  document.getElementById("sectionTitle").textContent = "Noah Kahan";
  document.getElementById("sectionSubtitle").textContent = `${songs.length} songs · just for you ♥`;
  renderSongs();
}

function showLikedSongs() {
  showingLiked = true;
  document.getElementById("btnLiked").classList.add("active");
  document.getElementById("btnAll").classList.remove("active");
  const count = likedSongs.length;
  document.getElementById("sectionTitle").textContent = "Liked Songs";
  document.getElementById("sectionSubtitle").textContent = `${count} song${count !== 1 ? 's' : ''} · your favourites`;
  renderSongs();
}

audio.addEventListener("timeupdate", () => {
  if (!audio.duration) return;
  seekBar.value = (audio.currentTime / audio.duration) * 100;
  currentTimeEl.textContent = fmt(audio.currentTime);
  totalTimeEl.textContent = fmt(audio.duration);
});

seekBar.addEventListener("input", () => {
  if (!audio.duration) return;
  audio.currentTime = (seekBar.value / 100) * audio.duration;
});

volSlider.addEventListener("input", () => { audio.volume = volSlider.value; });
audio.addEventListener("ended", nextSong);
audio.volume = parseFloat(volSlider.value);

/* ── DRAG AND DROP ── */
let dragSrc = null;

function setupDrag(el) {
  const handle = el.querySelector(".drag-handle");

  handle.addEventListener("mousedown", e => {
    e.preventDefault();
    dragSrc = el;
    el.classList.add("dragging");

    const onMove = e => {
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest(".song");
      document.querySelectorAll(".song.drag-over").forEach(d => d.classList.remove("drag-over"));
      if (target && target !== dragSrc) target.classList.add("drag-over");
    };

    const onUp = e => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      el.classList.remove("dragging");

      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest(".song");
      document.querySelectorAll(".song.drag-over").forEach(d => d.classList.remove("drag-over"));

      if (target && target !== dragSrc) {
        dropReorder(dragSrc.dataset.src, target.dataset.src);
      }
      dragSrc = null;
    };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  /* touch support */
  handle.addEventListener("touchstart", e => {
    e.preventDefault();
    dragSrc = el;
    el.classList.add("dragging");

    const onMove = e => {
      const t = e.touches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY)?.closest(".song");
      document.querySelectorAll(".song.drag-over").forEach(d => d.classList.remove("drag-over"));
      if (target && target !== dragSrc) target.classList.add("drag-over");
    };

    const onEnd = e => {
      handle.removeEventListener("touchmove", onMove);
      handle.removeEventListener("touchend", onEnd);
      el.classList.remove("dragging");

      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY)?.closest(".song");
      document.querySelectorAll(".song.drag-over").forEach(d => d.classList.remove("drag-over"));

      if (target && target !== dragSrc) {
        dropReorder(dragSrc.dataset.src, target.dataset.src);
      }
      dragSrc = null;
    };

    handle.addEventListener("touchmove", onMove, { passive: false });
    handle.addEventListener("touchend", onEnd);
  }, { passive: false });
}

function dropReorder(fromSrc, toSrc) {
  const fromIdx = songs.findIndex(s => s.src === fromSrc);
  const toIdx   = songs.findIndex(s => s.src === toSrc);
  if (fromIdx === -1 || toIdx === -1) return;

  const [moved] = songs.splice(fromIdx, 1);
  songs.splice(toIdx, 0, moved);
  saveOrder();
  renderSongs();
}

renderSongs();
</script>
